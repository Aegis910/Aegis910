<svg width="620" height="170" viewBox="0 0 620 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Бегущий Python</title>
  <desc id="desc">Пиксельный питон в стиле бегущего динозавра перепрыгивает через препятствия.</desc>

  <style>
    .sky { fill: #0d1117; }
    .grid { stroke: #21262d; stroke-width: 1; }
    .ground { stroke: #8b949e; stroke-width: 3; stroke-dasharray: 18 10; animation: dash 0.75s linear infinite; }
    .snake { animation: jump 1.35s cubic-bezier(.2,.7,.25,1) infinite; transform-origin: 132px 110px; }
    .snake-body { fill: #3fb950; }
    .snake-shadow { fill: #238636; }
    .snake-belly { fill: #f2cc60; }
    .snake-eye { fill: #0d1117; }
    .tongue { stroke: #ff6b9d; stroke-width: 3; stroke-linecap: square; animation: tongue 0.45s steps(2) infinite; }
    .obstacle { fill: #f85149; animation: obstacle 1.35s linear infinite; }
    .obstacle-dark { fill: #da3633; animation: obstacle 1.35s linear infinite; }
    .code { fill: #8b949e; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 14px; }
    .label { fill: #e6edf3; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 16px; font-weight: 700; }

    @keyframes jump {
      0%, 18%, 100% { transform: translateY(0); }
      42% { transform: translateY(-58px); }
      62% { transform: translateY(-58px); }
      82% { transform: translateY(0); }
    }

    @keyframes obstacle {
      from { transform: translateX(520px); }
      to { transform: translateX(-160px); }
    }

    @keyframes dash {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -28; }
    }

    @keyframes tongue {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }
  </style>

  <rect class="sky" width="620" height="170" rx="8"/>

  <g opacity="0.55">
    <path class="grid" d="M0 30H620"/>
    <path class="grid" d="M0 60H620"/>
    <path class="grid" d="M0 90H620"/>
    <path class="grid" d="M0 120H620"/>
    <path class="grid" d="M60 0V170"/>
    <path class="grid" d="M120 0V170"/>
    <path class="grid" d="M180 0V170"/>
    <path class="grid" d="M240 0V170"/>
    <path class="grid" d="M300 0V170"/>
    <path class="grid" d="M360 0V170"/>
    <path class="grid" d="M420 0V170"/>
    <path class="grid" d="M480 0V170"/>
    <path class="grid" d="M540 0V170"/>
  </g>

  <text class="label" x="28" y="32">python runner</text>
  <text class="code" x="28" y="53">while learning: jump_over("bugs")</text>

  <line class="ground" x1="24" y1="134" x2="596" y2="134"/>

  <g class="obstacle">
    <rect x="0" y="103" width="18" height="31" rx="2"/>
    <rect x="22" y="88" width="18" height="46" rx="2"/>
    <rect x="44" y="111" width="18" height="23" rx="2"/>
  </g>
  <g class="obstacle-dark" style="animation-delay: .08s">
    <rect x="0" y="119" width="62" height="15" rx="2"/>
  </g>

  <g class="snake">
    <ellipse cx="112" cy="144" rx="58" ry="8" fill="#000" opacity="0.2"/>

    <rect class="snake-shadow" x="62" y="98" width="20" height="20" rx="4"/>
    <rect class="snake-body" x="82" y="88" width="20" height="20" rx="4"/>
    <rect class="snake-body" x="102" y="88" width="20" height="20" rx="4"/>
    <rect class="snake-belly" x="102" y="108" width="20" height="12" rx="3"/>
    <rect class="snake-body" x="122" y="98" width="20" height="20" rx="4"/>
    <rect class="snake-body" x="142" y="98" width="20" height="20" rx="4"/>
    <rect class="snake-shadow" x="162" y="108" width="20" height="20" rx="4"/>
    <rect class="snake-body" x="182" y="98" width="24" height="24" rx="5"/>

    <rect class="snake-belly" x="122" y="118" width="20" height="12" rx="3"/>
    <rect class="snake-belly" x="142" y="118" width="20" height="12" rx="3"/>

    <rect class="snake-eye" x="195" y="104" width="4" height="4" rx="1"/>
    <path class="tongue" d="M206 112H219M219 112L226 107M219 112L226 117"/>

    <rect class="snake-shadow" x="72" y="118" width="18" height="10" rx="3"/>
    <rect class="snake-shadow" x="166" y="128" width="18" height="10" rx="3"/>
  </g>
</svg>
