<svg width="760" height="150" viewBox="0 0 760 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Python runner</title>
  <desc id="desc">Минималистичная игра в стиле Chrome Dino: вместо динозавра пиксельная змейка перепрыгивает кактусы.</desc>

  <style>
    .bg { fill: #ffffff; }
    .ground { stroke: #535353; stroke-width: 2; stroke-dasharray: 18 8; animation: ground .55s linear infinite; }
    .snake { animation: jump 1.18s cubic-bezier(.25,.75,.2,1) infinite; transform-origin: 128px 102px; }
    .body { fill: #535353; }
    .belly { fill: #8a8a8a; }
    .eye { fill: #ffffff; }
    .cactus { fill: #535353; animation: cactus 1.18s linear infinite; }
    .cactus.second { animation-delay: .54s; opacity: .82; }
    .cloud { fill: none; stroke: #b8b8b8; stroke-width: 2; animation: cloud 6s linear infinite; }

    @keyframes jump {
      0%, 14%, 100% { transform: translateY(0); }
      38%, 58% { transform: translateY(-56px); }
      80% { transform: translateY(0); }
    }

    @keyframes cactus {
      from { transform: translateX(790px); }
      to { transform: translateX(-120px); }
    }

    @keyframes ground {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -26; }
    }

    @keyframes cloud {
      from { transform: translateX(760px); }
      to { transform: translateX(-260px); }
    }
  </style>

  <rect class="bg" width="760" height="150" rx="6"/>

  <path class="cloud" d="M72 42h42c4-14 24-14 29 0h28"/>
  <path class="cloud" style="animation-delay: -3s" d="M320 30h34c3-10 20-10 24 0h23"/>

  <line class="ground" x1="20" y1="120" x2="740" y2="120"/>

  <g class="cactus">
    <rect x="0" y="76" width="13" height="44" rx="1"/>
    <rect x="-13" y="92" width="13" height="9" rx="1"/>
    <rect x="-13" y="84" width="7" height="17" rx="1"/>
    <rect x="13" y="88" width="13" height="9" rx="1"/>
    <rect x="19" y="80" width="7" height="17" rx="1"/>
  </g>

  <g class="cactus second">
    <rect x="0" y="84" width="11" height="36" rx="1"/>
    <rect x="15" y="70" width="13" height="50" rx="1"/>
    <rect x="28" y="92" width="11" height="28" rx="1"/>
  </g>

  <g class="snake">
    <rect class="body" x="52" y="94" width="18" height="18" rx="2"/>
    <rect class="body" x="70" y="86" width="18" height="18" rx="2"/>
    <rect class="body" x="88" y="86" width="18" height="18" rx="2"/>
    <rect class="belly" x="88" y="104" width="18" height="10" rx="1"/>
    <rect class="body" x="106" y="94" width="18" height="18" rx="2"/>
    <rect class="belly" x="106" y="112" width="18" height="8" rx="1"/>
    <rect class="body" x="124" y="94" width="18" height="18" rx="2"/>
    <rect class="belly" x="124" y="112" width="18" height="8" rx="1"/>
    <rect class="body" x="142" y="86" width="18" height="18" rx="2"/>
    <rect class="body" x="160" y="86" width="18" height="18" rx="2"/>
    <rect class="body" x="178" y="78" width="26" height="26" rx="3"/>
    <rect class="eye" x="194" y="85" width="5" height="5" rx="1"/>
    <rect class="body" x="204" y="91" width="10" height="5" rx="1"/>
    <rect class="body" x="62" y="112" width="16" height="8" rx="1"/>
    <rect class="body" x="150" y="112" width="16" height="8" rx="1"/>
  </g>
</svg>
