<svg width="760" height="150" viewBox="0 0 760 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Python runner</title>
  <desc id="desc">Минималистичная игра в стиле Chrome Dino: вместо динозавра змейка перепрыгивает кактусы, сверху отображается счёт.</desc>

  <style>
    .bg { fill: #ffffff; }
    .ground { stroke: #535353; stroke-width: 2; stroke-dasharray: 18 8; animation: ground .55s linear infinite; }
    .snake { animation: jump 1.18s cubic-bezier(.25,.75,.2,1) infinite; transform-origin: 112px 106px; }
    .outline { fill: #151515; }
    .body { fill: #5fbe38; }
    .light { fill: #9ee35d; }
    .dark { fill: #2b7a2e; }
    .belly { fill: #d8f77a; }
    .eye { fill: #ffffff; }
    .pupil { fill: #151515; }
    .tongue { fill: #e03131; animation: tongue .5s steps(2) infinite; }
    .cactus { fill: #535353; animation: cactus 1.18s linear infinite; }
    .cactus.second { animation-delay: .54s; opacity: .82; }
    .cloud { fill: none; stroke: #b8b8b8; stroke-width: 2; animation: cloud 6s linear infinite; }
    .score { fill: #535353; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    .score-frame { opacity: 0; }
    .score-1 { animation: score1 5s steps(1) infinite; }
    .score-2 { animation: score2 5s steps(1) infinite; }
    .score-3 { animation: score3 5s steps(1) infinite; }
    .score-4 { animation: score4 5s steps(1) infinite; }
    .score-5 { animation: score5 5s steps(1) infinite; }

    @keyframes jump {
      0%, 14%, 100% { transform: translateY(0); }
      38%, 58% { transform: translateY(-52px); }
      80% { transform: translateY(0); }
    }

    @keyframes cactus {
      from { transform: translateX(790px); }
      to { transform: translateX(-120px); }
    }

    @keyframes ground {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -26; }
    }

    @keyframes cloud {
      from { transform: translateX(760px); }
      to { transform: translateX(-260px); }
    }

    @keyframes tongue {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @keyframes score1 {
      0%, 19.999% { opacity: 1; }
      20%, 100% { opacity: 0; }
    }

    @keyframes score2 {
      0%, 19.999% { opacity: 0; }
      20%, 39.999% { opacity: 1; }
      40%, 100% { opacity: 0; }
    }

    @keyframes score3 {
      0%, 39.999% { opacity: 0; }
      40%, 59.999% { opacity: 1; }
      60%, 100% { opacity: 0; }
    }

    @keyframes score4 {
      0%, 59.999% { opacity: 0; }
      60%, 79.999% { opacity: 1; }
      80%, 100% { opacity: 0; }
    }

    @keyframes score5 {
      0%, 79.999% { opacity: 0; }
      80%, 100% { opacity: 1; }
    }
  </style>

  <rect class="bg" width="760" height="150" rx="6"/>

  <text class="score" x="574" y="28">HI 004210</text>
  <text class="score score-frame score-1" x="676" y="28">000790</text>
  <text class="score score-frame score-2" x="676" y="28">000840</text>
  <text class="score score-frame score-3" x="676" y="28">000910</text>
  <text class="score score-frame score-4" x="676" y="28">000980</text>
  <text class="score score-frame score-5" x="676" y="28">001050</text>

  <path class="cloud" d="M72 42h42c4-14 24-14 29 0h28"/>
  <path class="cloud" style="animation-delay: -3s" d="M320 30h34c3-10 20-10 24 0h23"/>

  <line class="ground" x1="20" y1="120" x2="740" y2="120"/>

  <g class="cactus">
    <rect x="0" y="76" width="13" height="44" rx="1"/>
    <rect x="-13" y="92" width="13" height="9" rx="1"/>
    <rect x="-13" y="84" width="7" height="17" rx="1"/>
    <rect x="13" y="88" width="13" height="9" rx="1"/>
    <rect x="19" y="80" width="7" height="17" rx="1"/>
  </g>

  <g class="cactus second">
    <rect x="0" y="84" width="11" height="36" rx="1"/>
    <rect x="15" y="70" width="13" height="50" rx="1"/>
    <rect x="28" y="92" width="11" height="28" rx="1"/>
  </g>

  <g class="snake">
    <rect class="outline" x="54" y="106" width="72" height="10"/>
    <rect class="outline" x="46" y="98" width="18" height="18"/>
    <rect class="outline" x="54" y="90" width="18" height="18"/>
    <rect class="outline" x="70" y="82" width="18" height="18"/>
    <rect class="outline" x="86" y="74" width="18" height="18"/>
    <rect class="outline" x="102" y="66" width="18" height="18"/>
    <rect class="outline" x="118" y="66" width="18" height="18"/>
    <rect class="outline" x="126" y="74" width="18" height="18"/>
    <rect class="outline" x="118" y="82" width="18" height="18"/>
    <rect class="outline" x="110" y="90" width="18" height="18"/>
    <rect class="outline" x="102" y="98" width="18" height="18"/>
    <rect class="outline" x="126" y="58" width="26" height="18"/>
    <rect class="outline" x="144" y="64" width="12" height="10"/>
    <rect class="tongue" x="156" y="68" width="8" height="4"/>
    <rect class="tongue" x="164" y="64" width="5" height="4"/>
    <rect class="tongue" x="164" y="72" width="5" height="4"/>

    <rect class="dark" x="62" y="106" width="58" height="6"/>
    <rect class="body" x="54" y="98" width="18" height="10"/>
    <rect class="body" x="62" y="90" width="18" height="10"/>
    <rect class="body" x="78" y="82" width="18" height="10"/>
    <rect class="body" x="94" y="74" width="18" height="10"/>
    <rect class="body" x="110" y="74" width="18" height="10"/>
    <rect class="body" x="118" y="82" width="10" height="18"/>
    <rect class="body" x="110" y="98" width="10" height="10"/>
    <rect class="body" x="126" y="66" width="22" height="10"/>
    <rect class="light" x="70" y="90" width="10" height="6"/>
    <rect class="light" x="86" y="82" width="10" height="6"/>
    <rect class="light" x="102" y="74" width="10" height="6"/>
    <rect class="light" x="126" y="66" width="10" height="5"/>
    <rect class="belly" x="82" y="100" width="34" height="6"/>
    <rect class="belly" x="114" y="84" width="8" height="14"/>
    <rect class="eye" x="138" y="66" width="5" height="5"/>
    <rect class="pupil" x="141" y="67" width="2" height="2"/>
  </g>
</svg>
