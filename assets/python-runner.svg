<svg width="760" height="150" viewBox="0 0 760 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Python runner</title>
  <desc id="desc">Минималистичная игра в стиле Chrome Dino: вместо динозавра змейка перепрыгивает кактусы, сверху отображается счёт.</desc>

  <style>
    .bg { fill: #ffffff; }
    .ground { stroke: #535353; stroke-width: 2; stroke-dasharray: 18 8; animation: ground .55s linear infinite; }
    .snake { animation: jump 1.18s cubic-bezier(.25,.75,.2,1) infinite; transform-origin: 118px 105px; }
    .snake-fill { fill: #111111; }
    .snake-line { stroke: #ffffff; stroke-width: 2; stroke-linecap: round; }
    .eye { fill: #ffffff; }
    .tongue { stroke: #111111; stroke-width: 1.5; stroke-linecap: square; animation: tongue .5s steps(2) infinite; }
    .cactus { fill: #535353; animation: cactus 1.18s linear infinite; }
    .cactus.second { animation-delay: .54s; opacity: .82; }
    .cloud { fill: none; stroke: #b8b8b8; stroke-width: 2; animation: cloud 6s linear infinite; }
    .score { fill: #535353; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    .digit-a { animation: digitA 3s steps(1) infinite; }
    .digit-b { animation: digitB 2s steps(1) infinite; }
    .digit-c { animation: digitC 1s steps(1) infinite; }

    @keyframes jump {
      0%, 14%, 100% { transform: translateY(0); }
      38%, 58% { transform: translateY(-52px); }
      80% { transform: translateY(0); }
    }

    @keyframes cactus {
      from { transform: translateX(790px); }
      to { transform: translateX(-120px); }
    }

    @keyframes ground {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -26; }
    }

    @keyframes cloud {
      from { transform: translateX(760px); }
      to { transform: translateX(-260px); }
    }

    @keyframes tongue {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @keyframes digitA {
      0% { opacity: .25; }
      34% { opacity: .55; }
      67% { opacity: 1; }
    }

    @keyframes digitB {
      0% { opacity: .45; }
      50% { opacity: 1; }
    }

    @keyframes digitC {
      0% { opacity: .45; }
      50% { opacity: 1; }
    }
  </style>

  <rect class="bg" width="760" height="150" rx="6"/>

  <text class="score" x="574" y="28">HI 004210</text>
  <text class="score" x="676" y="28">00<tspan class="digit-a">7</tspan><tspan class="digit-b">9</tspan><tspan class="digit-c">0</tspan></text>

  <path class="cloud" d="M72 42h42c4-14 24-14 29 0h28"/>
  <path class="cloud" style="animation-delay: -3s" d="M320 30h34c3-10 20-10 24 0h23"/>

  <line class="ground" x1="20" y1="120" x2="740" y2="120"/>

  <g class="cactus">
    <rect x="0" y="76" width="13" height="44" rx="1"/>
    <rect x="-13" y="92" width="13" height="9" rx="1"/>
    <rect x="-13" y="84" width="7" height="17" rx="1"/>
    <rect x="13" y="88" width="13" height="9" rx="1"/>
    <rect x="19" y="80" width="7" height="17" rx="1"/>
  </g>

  <g class="cactus second">
    <rect x="0" y="84" width="11" height="36" rx="1"/>
    <rect x="15" y="70" width="13" height="50" rx="1"/>
    <rect x="28" y="92" width="11" height="28" rx="1"/>
  </g>

  <g class="snake">
    <path class="snake-fill" d="M45 113c11 9 32 9 50 3 15-5 29-5 42 0 11 4 30 5 42-2 10-6 7-17-5-17-14 0-26 10-43 8-16-2-27-12-47-8-14 3-28 13-39 16Z"/>
    <path class="snake-fill" d="M83 100c8-17 18-29 33-34 10-3 18 1 20 9 3 11-7 17-17 19-10 2-17 6-23 16l-13-10Z"/>
    <path class="snake-fill" d="M114 65c4-16 14-27 31-30 15-3 31 2 34 12 2 8-7 14-23 16-16 2-23 9-27 18l-15-16Z"/>
    <ellipse class="snake-fill" cx="163" cy="48" rx="25" ry="13"/>
    <circle class="eye" cx="172" cy="44" r="2.7"/>
    <path class="tongue" d="M188 50h10M198 50l6-4M198 50l6 4"/>

    <path class="snake-line" d="M64 111c19 6 34-3 51-2 15 1 26 9 43 4"/>
    <path class="snake-line" d="M103 100c5-8 13-13 22-16"/>
    <path class="snake-line" d="M132 69c7-8 17-12 30-13"/>
    <path class="snake-line" d="M93 103c6 4 13 6 21 7"/>
    <path class="snake-line" d="M122 82c6 4 13 5 21 4"/>
    <path class="snake-line" d="M149 59c7 3 15 3 23 1"/>
  </g>
</svg>
