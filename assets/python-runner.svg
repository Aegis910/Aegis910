<svg width="760" height="150" viewBox="0 0 760 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Python runner</title>
  <desc id="desc">Светлый пиксельный раннер в стиле Chrome Dino: маленькая зелёная змейка перепрыгивает кактус, сверху отображается счёт.</desc>

  <style>
    .bg { fill: #fafafa; }
    .score { fill: #646464; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 24px; font-weight: 800; letter-spacing: 2px; }
    .cloud { fill: none; stroke: #d2d2d2; stroke-width: 5; stroke-linecap: square; stroke-linejoin: miter; animation: cloud 7s linear infinite; }
    .ground { stroke: #676767; stroke-width: 3; stroke-linecap: square; }
    .grain { fill: #747474; opacity: .62; animation: grain 1.2s steps(2) infinite; }
    .dust { fill: #8a8a8a; opacity: .7; animation: dust .9s linear infinite; }
    .cactus { fill: #777; animation: cactus 1.35s linear infinite; }
    .cactus-dark { fill: #5f5f5f; animation: cactus 1.35s linear infinite; }
    .hill { fill: none; stroke: #676767; stroke-width: 3; stroke-linecap: square; stroke-linejoin: miter; animation: hill 3.4s linear infinite; }
    .snake { animation: jump 1.35s cubic-bezier(.25,.75,.2,1) infinite; transform-origin: 150px 86px; }
    .outline { fill: #111; }
    .body { fill: #5fca45; }
    .light { fill: #9bed59; }
    .dark { fill: #2e8f3d; }
    .belly { fill: #e2f56f; }
    .eye { fill: #111; }
    .tongue { fill: #e64a4a; animation: tongue .5s steps(2) infinite; }
    .score-frame { opacity: 0; }
    .score-1 { animation: score1 5s steps(1) infinite; }
    .score-2 { animation: score2 5s steps(1) infinite; }
    .score-3 { animation: score3 5s steps(1) infinite; }
    .score-4 { animation: score4 5s steps(1) infinite; }
    .score-5 { animation: score5 5s steps(1) infinite; }

    @keyframes jump {
      0%, 15%, 100% { transform: translateY(0); }
      40%, 58% { transform: translateY(-40px); }
      82% { transform: translateY(0); }
    }

    @keyframes cactus {
      from { transform: translateX(780px); }
      to { transform: translateX(-90px); }
    }

    @keyframes cloud {
      from { transform: translateX(760px); }
      to { transform: translateX(-220px); }
    }

    @keyframes hill {
      from { transform: translateX(780px); }
      to { transform: translateX(-260px); }
    }

    @keyframes dust {
      from { transform: translateX(0); opacity: .75; }
      to { transform: translateX(-34px); opacity: .2; }
    }

    @keyframes grain {
      0%, 100% { opacity: .55; }
      50% { opacity: .25; }
    }

    @keyframes tongue {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @keyframes score1 {
      0%, 19.999% { opacity: 1; }
      20%, 100% { opacity: 0; }
    }

    @keyframes score2 {
      0%, 19.999% { opacity: 0; }
      20%, 39.999% { opacity: 1; }
      40%, 100% { opacity: 0; }
    }

    @keyframes score3 {
      0%, 39.999% { opacity: 0; }
      40%, 59.999% { opacity: 1; }
      60%, 100% { opacity: 0; }
    }

    @keyframes score4 {
      0%, 59.999% { opacity: 0; }
      60%, 79.999% { opacity: 1; }
      80%, 100% { opacity: 0; }
    }

    @keyframes score5 {
      0%, 79.999% { opacity: 0; }
      80%, 100% { opacity: 1; }
    }
  </style>

  <rect class="bg" width="760" height="150" rx="6"/>

  <text class="score" x="450" y="30">HI 00234</text>
  <text class="score score-frame score-1" x="620" y="30">00056</text>
  <text class="score score-frame score-2" x="620" y="30">00078</text>
  <text class="score score-frame score-3" x="620" y="30">00104</text>
  <text class="score score-frame score-4" x="620" y="30">00136</text>
  <text class="score score-frame score-5" x="620" y="30">00172</text>

  <path class="cloud" d="M70 48h16v-8h8v-8h10v-8h28v8h10v8h8v8h16"/>
  <path class="cloud" style="animation-delay: -3.2s" d="M380 62h12v-7h8v-8h18v8h8v7h13"/>

  <path class="hill" d="M20 120h45l9-9h11l8 9h380l8-8h17l8 8h220"/>
  <line class="ground" x1="18" y1="120" x2="742" y2="120"/>

  <g class="grain">
    <rect x="42" y="134" width="5" height="5"/>
    <rect x="76" y="130" width="7" height="5"/>
    <rect x="118" y="138" width="4" height="4"/>
    <rect x="182" y="132" width="6" height="6"/>
    <rect x="268" y="137" width="7" height="4"/>
    <rect x="358" y="134" width="5" height="5"/>
    <rect x="440" y="138" width="6" height="4"/>
    <rect x="598" y="134" width="6" height="4"/>
    <rect x="686" y="136" width="5" height="5"/>
  </g>

  <g class="cactus">
    <rect x="0" y="76" width="16" height="44"/>
    <rect x="-15" y="92" width="15" height="10"/>
    <rect x="-15" y="82" width="8" height="20"/>
    <rect x="16" y="88" width="15" height="10"/>
    <rect x="23" y="78" width="8" height="20"/>
  </g>
  <g class="cactus-dark">
    <rect x="4" y="76" width="9" height="44"/>
    <rect x="-11" y="92" width="11" height="10"/>
    <rect x="16" y="88" width="11" height="10"/>
  </g>

  <g class="dust">
    <rect x="112" y="101" width="5" height="5"/>
    <rect x="93" y="107" width="4" height="4"/>
    <rect x="72" y="113" width="5" height="5"/>
  </g>

  <g class="snake">
    <rect class="outline" x="98" y="86" width="52" height="8"/>
    <rect class="outline" x="90" y="78" width="18" height="18"/>
    <rect class="outline" x="106" y="72" width="18" height="18"/>
    <rect class="outline" x="124" y="66" width="18" height="18"/>
    <rect class="outline" x="142" y="58" width="18" height="18"/>
    <rect class="outline" x="158" y="50" width="26" height="18"/>
    <rect class="outline" x="180" y="56" width="12" height="10"/>
    <rect class="outline" x="132" y="82" width="16" height="16"/>
    <rect class="outline" x="148" y="74" width="16" height="16"/>

    <rect class="body" x="98" y="84" width="46" height="6"/>
    <rect class="body" x="96" y="78" width="16" height="10"/>
    <rect class="body" x="112" y="72" width="16" height="10"/>
    <rect class="body" x="128" y="66" width="16" height="10"/>
    <rect class="body" x="144" y="58" width="16" height="10"/>
    <rect class="body" x="160" y="54" width="22" height="12"/>
    <rect class="body" x="136" y="82" width="12" height="8"/>
    <rect class="body" x="150" y="74" width="10" height="10"/>

    <rect class="light" x="104" y="80" width="10" height="4"/>
    <rect class="light" x="120" y="74" width="10" height="4"/>
    <rect class="light" x="136" y="68" width="10" height="4"/>
    <rect class="light" x="160" y="54" width="10" height="4"/>
    <rect class="dark" x="100" y="90" width="42" height="4"/>
    <rect class="belly" x="122" y="86" width="28" height="5"/>
    <rect class="belly" x="146" y="68" width="6" height="10"/>
    <rect class="eye" x="174" y="56" width="4" height="4"/>

    <rect class="tongue" x="192" y="60" width="8" height="4"/>
    <rect class="tongue" x="200" y="56" width="5" height="4"/>
    <rect class="tongue" x="200" y="64" width="5" height="4"/>
  </g>
</svg>
