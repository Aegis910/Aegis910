<svg width="760" height="170" viewBox="0 0 760 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Python runner</title>
  <desc id="desc">Пиксельная змейка в стиле Google Dino перепрыгивает препятствие.</desc>

  <style>
    .bg { fill: #0d1117; }
    .ground { stroke: #8b949e; stroke-width: 3; stroke-dasharray: 22 14; animation: ground 0.7s linear infinite; }
    .snake { animation: jump 1.35s cubic-bezier(.22,.7,.18,1) infinite; transform-origin: 150px 118px; }
    .pixel { fill: #e6edf3; }
    .shade { fill: #8b949e; }
    .eye { fill: #0d1117; }
    .accent { fill: #ffd43b; }
    .obstacle { fill: #8b949e; animation: obstacle 1.35s linear infinite; }
    .obstacle.two { animation-delay: .62s; opacity: .7; }
    .caption { fill: #8b949e; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 14px; }

    @keyframes jump {
      0%, 16%, 100% { transform: translateY(0); }
      42%, 60% { transform: translateY(-54px); }
      82% { transform: translateY(0); }
    }

    @keyframes obstacle {
      from { transform: translateX(770px); }
      to { transform: translateX(-140px); }
    }

    @keyframes ground {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -36; }
    }
  </style>

  <rect class="bg" width="760" height="170" rx="8"/>
  <text class="caption" x="26" y="30">continuous improvement / python / automation</text>
  <line class="ground" x1="24" y1="138" x2="736" y2="138"/>

  <g class="obstacle">
    <rect x="0" y="100" width="16" height="38" rx="2"/>
    <rect x="22" y="82" width="16" height="56" rx="2"/>
    <rect x="44" y="112" width="16" height="26" rx="2"/>
  </g>

  <g class="obstacle two">
    <rect x="0" y="108" width="14" height="30" rx="2"/>
    <rect x="20" y="94" width="14" height="44" rx="2"/>
  </g>

  <g class="snake">
    <ellipse cx="144" cy="149" rx="78" ry="7" fill="#000" opacity=".22"/>

    <rect class="shade" x="54" y="110" width="20" height="20" rx="3"/>
    <rect class="pixel" x="74" y="100" width="20" height="20" rx="3"/>
    <rect class="pixel" x="94" y="100" width="20" height="20" rx="3"/>
    <rect class="accent" x="94" y="120" width="20" height="14" rx="2"/>
    <rect class="pixel" x="114" y="110" width="20" height="20" rx="3"/>
    <rect class="accent" x="114" y="130" width="20" height="10" rx="2"/>
    <rect class="pixel" x="134" y="110" width="20" height="20" rx="3"/>
    <rect class="accent" x="134" y="130" width="20" height="10" rx="2"/>
    <rect class="pixel" x="154" y="100" width="20" height="20" rx="3"/>
    <rect class="shade" x="154" y="120" width="20" height="14" rx="2"/>
    <rect class="pixel" x="174" y="100" width="20" height="20" rx="3"/>
    <rect class="pixel" x="194" y="90" width="30" height="30" rx="4"/>
    <rect class="eye" x="214" y="98" width="5" height="5" rx="1"/>

    <rect class="shade" x="70" y="132" width="18" height="7" rx="2"/>
    <rect class="shade" x="164" y="132" width="18" height="7" rx="2"/>
    <rect class="pixel" x="224" y="104" width="12" height="5" rx="1"/>
  </g>
</svg>
