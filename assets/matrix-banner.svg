<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aegis910 Matrix banner</title>
  <desc id="desc">Тёмный баннер в стиле Matrix с падающими символами и подписью DevOps Engineer.</desc>

  <style>
    .bg { fill: #050807; }
    .glow { filter: url(#glow); }
    .code { fill: #00ff66; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 18px; opacity: .74; }
    .code.dim { opacity: .28; }
    .name { fill: #e6ffe9; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 58px; font-weight: 800; letter-spacing: 0; }
    .role { fill: #83ff9f; font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; font-size: 20px; letter-spacing: 0; }
    .line { stroke: #00ff66; stroke-width: 2; opacity: .75; }
    .rain-a { animation: rain 5s linear infinite; }
    .rain-b { animation: rain 6.4s linear infinite; }
    .rain-c { animation: rain 7.2s linear infinite; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }

    @keyframes rain {
      from { transform: translateY(-250px); }
      to { transform: translateY(270px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: .74; }
      50% { opacity: 1; }
    }
  </style>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050807"/>
      <stop offset=".45" stop-color="#050807" stop-opacity=".18"/>
      <stop offset="1" stop-color="#050807"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1000" height="260" rx="10"/>

  <g class="glow">
    <g class="rain-a">
      <text class="code" x="38" y="12">0101</text><text class="code dim" x="38" y="42">sudo</text><text class="code" x="38" y="72">ssh</text><text class="code dim" x="38" y="102">yaml</text><text class="code" x="38" y="132">TLS</text><text class="code dim" x="38" y="162">logs</text><text class="code" x="38" y="192">CI</text><text class="code dim" x="38" y="222">prod</text>
      <text class="code dim" x="176" y="32">deploy</text><text class="code" x="176" y="62">docker</text><text class="code dim" x="176" y="92">nginx</text><text class="code" x="176" y="122">bash</text><text class="code dim" x="176" y="152">git</text><text class="code" x="176" y="182">ops</text><text class="code dim" x="176" y="212">443</text>
      <text class="code" x="782" y="18">health</text><text class="code dim" x="782" y="48">check</text><text class="code" x="782" y="78">rollback</text><text class="code dim" x="782" y="108">proxy</text><text class="code" x="782" y="138">systemd</text><text class="code dim" x="782" y="168">env</text><text class="code" x="782" y="198">build</text>
    </g>
    <g class="rain-b">
      <text class="code dim" x="104" y="18">1010</text><text class="code" x="104" y="48">root</text><text class="code dim" x="104" y="78">vps</text><text class="code" x="104" y="108">api</text><text class="code dim" x="104" y="138">sec</text><text class="code" x="104" y="168">run</text><text class="code dim" x="104" y="198">tcp</text><text class="code" x="104" y="228">443</text>
      <text class="code" x="708" y="28">python</text><text class="code dim" x="708" y="58">script</text><text class="code" x="708" y="88">release</text><text class="code dim" x="708" y="118">secret</text><text class="code" x="708" y="148">stage</text><text class="code dim" x="708" y="178">main</text><text class="code" x="708" y="208">push</text>
      <text class="code dim" x="904" y="36">0001</text><text class="code" x="904" y="66">linux</text><text class="code dim" x="904" y="96">firewall</text><text class="code" x="904" y="126">ssh</text><text class="code dim" x="904" y="156">tls</text><text class="code" x="904" y="186">prod</text>
    </g>
    <g class="rain-c">
      <text class="code" x="246" y="24">compose</text><text class="code dim" x="246" y="54">image</text><text class="code" x="246" y="84">tag</text><text class="code dim" x="246" y="114">cache</text><text class="code" x="246" y="144">test</text><text class="code dim" x="246" y="174">ship</text><text class="code" x="246" y="204">safe</text>
      <text class="code dim" x="628" y="12">0100</text><text class="code" x="628" y="42">branch</text><text class="code dim" x="628" y="72">merge</text><text class="code" x="628" y="102">audit</text><text class="code dim" x="628" y="132">backup</text><text class="code" x="628" y="162">restore</text><text class="code dim" x="628" y="192">verify</text>
    </g>
  </g>

  <rect width="1000" height="260" fill="url(#fade)"/>
  <rect x="76" y="58" width="848" height="144" rx="8" fill="#050807" opacity=".78" stroke="#00ff66" stroke-opacity=".35"/>
  <line class="line pulse" x1="102" y1="178" x2="898" y2="178"/>

  <text class="name glow" x="500" y="128" text-anchor="middle">Aegis910</text>
  <text class="role pulse" x="500" y="164" text-anchor="middle">DevOps Engineer · Linux · CI/CD · Automation</text>
</svg>
