<svg width="360" height="280" viewBox="0 0 360 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Диаграмма активности GitHub</title>
  <desc id="desc">Радар-диаграмма активности: код-ревью 25%, задачи 1%, pull requests 32%, коммиты 42%.</desc>

  <rect width="360" height="280" rx="8" fill="#0d1117"/>

  <g stroke="#2ea043" stroke-width="2">
    <line x1="180" y1="42" x2="180" y2="226"/>
    <line x1="76" y1="134" x2="284" y2="134"/>
  </g>

  <path d="M180 88 L181.8 134 L180 163.4 L136.3 134 Z" fill="#2ea043" fill-opacity="0.62" stroke="#3fb950" stroke-width="2.2"/>

  <g fill="#e6edf3" stroke="#3fb950" stroke-width="2">
    <circle cx="180" cy="88" r="4"/>
    <circle cx="181.8" cy="134" r="4"/>
    <circle cx="180" cy="163.4" r="4"/>
    <circle cx="136.3" cy="134" r="4"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#8b949e">
    <text x="180" y="26" text-anchor="middle">25%</text>
    <text x="180" y="44" text-anchor="middle">Код-ревью</text>

    <text x="304" y="132" text-anchor="middle">1%</text>
    <text x="304" y="150" text-anchor="middle">Задачи</text>

    <text x="180" y="242" text-anchor="middle">32%</text>
    <text x="180" y="260" text-anchor="middle">Pull requests</text>

    <text x="58" y="132" text-anchor="middle">42%</text>
    <text x="58" y="150" text-anchor="middle">Коммиты</text>
  </g>
</svg>
